<!-- ================================================================
     TRANSPARENT BACKGROUND MAKER — Advanced Edition
     Safe to paste directly inside an Elementor "HTML" widget.
     Everything is scoped under .tbm-wrap / #tbm_* so it will not
     clash with your theme's global CSS or JS.
     ================================================================ -->
<div class="tbm-wrap" id="tbm_root" tabindex="0">
  <style>
    #tbm_root, #tbm_root * { box-sizing: border-box !important; }

    #tbm_root{
      --tbm-primary:#3b82f6;
      --tbm-primary-dark:#2563eb;
      --tbm-bg:#eff6ff;
      --tbm-green:#10b981;
      --tbm-green-dark:#059669;
      --tbm-red:#ef4444;
      --tbm-purple:#8b5cf6;
      --tbm-amber:#f59e0b;
      --tbm-text:#1e293b;
      --tbm-muted:#64748b;
      --tbm-border:#dbeafe;

      max-width:760px;
      margin:20px auto;
      font-family:'Inter','Segoe UI',Arial,sans-serif !important;
      background:#ffffff;
      border-radius:16px;
      padding:24px;
      box-shadow:0 10px 25px rgba(0,0,0,0.06);
      border:1px solid var(--tbm-border);
      text-align:center;
      color:var(--tbm-text) !important;
      position:relative;
    }

    #tbm_root h3.tbm-title{
      color:#1e3a8a !important;
      font-weight:800 !important;
      font-size:22px !important;
      margin:0 0 4px 0 !important;
      font-family:'Inter','Segoe UI',Arial,sans-serif !important;
      line-height:1.3 !important;
    }
    #tbm_root p.tbm-sub{
      color:var(--tbm-muted) !important;
      font-size:13px !important;
      margin:0 0 18px 0 !important;
      font-family:'Inter','Segoe UI',Arial,sans-serif !important;
    }

    /* ---------- Upload area ---------- */
    #tbm_root .tbm-upload{
      border:2px dashed #bfdbfe;
      padding:26px 16px;
      border-radius:12px;
      background:var(--tbm-bg);
      cursor:pointer;
      margin-bottom:18px;
      transition:.15s ease;
    }
    #tbm_root .tbm-upload.tbm-drag{
      background:#dbeafe;
      border-color:var(--tbm-primary);
    }
    #tbm_root .tbm-upload p{ margin:0 !important; color:var(--tbm-text) !important; font-size:14px !important; font-family:'Inter','Segoe UI',Arial,sans-serif !important; }
    #tbm_root .tbm-upload small{ display:block; margin-top:6px; color:var(--tbm-muted) !important; font-size:11px !important; }

    /* ---------- Info bar ---------- */
    #tbm_root .tbm-info{
      display:none;
      font-size:12px;
      color:var(--tbm-muted) !important;
      margin-bottom:14px;
      background:#f8fafc;
      border-radius:8px;
      padding:8px 10px;
    }

    /* ---------- Controls card ---------- */
    #tbm_root .tbm-controls{
      display:none;
      flex-direction:column;
      gap:16px;
      text-align:left;
      background:#f8fafc;
      padding:16px;
      border-radius:12px;
      margin-bottom:18px;
      border:1px solid #e2e8f0;
    }
    #tbm_root .tbm-row{ display:flex; flex-wrap:wrap; gap:14px; }
    #tbm_root .tbm-field{ display:flex; flex-direction:column; gap:6px; flex:1 1 150px; min-width:140px; }
    #tbm_root .tbm-field label{
      font-size:11px !important; font-weight:800 !important; color:var(--tbm-muted) !important;
      text-transform:uppercase; letter-spacing:.3px;
    }
    #tbm_root .tbm-field .tbm-val{ font-size:11px; color:var(--tbm-primary-dark); font-weight:700; }
    #tbm_root input[type=range]{ width:100%; accent-color:var(--tbm-primary); }
    #tbm_root input[type=color]{
      width:42px; height:32px; border:1px solid #cbd5e1; border-radius:6px; padding:0; cursor:pointer; background:none;
    }
    #tbm_root .tbm-checkbox{ display:flex; align-items:center; gap:8px; font-size:13px; color:var(--tbm-text) !important; }
    #tbm_root .tbm-checkbox input{ width:16px; height:16px; accent-color:var(--tbm-primary); cursor:pointer; }

    /* ---------- Color chips ---------- */
    #tbm_root .tbm-colors{ display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
    #tbm_root .tbm-chip{
      display:flex; align-items:center; gap:6px; background:#fff; border:1px solid #cbd5e1;
      border-radius:20px; padding:4px 8px 4px 4px; font-size:11px; color:var(--tbm-text) !important;
    }
    #tbm_root .tbm-chip .tbm-swatch{ width:18px; height:18px; border-radius:50%; border:1px solid #cbd5e1; }
    #tbm_root .tbm-chip button{
      border:none; background:#f1f5f9; color:#64748b; width:16px; height:16px; border-radius:50%;
      cursor:pointer; font-size:11px; line-height:1; padding:0;
    }
    #tbm_root .tbm-presets{ display:flex; gap:6px; flex-wrap:wrap; }
    #tbm_root .tbm-preset-dot{
      width:22px; height:22px; border-radius:50%; border:2px solid #fff; box-shadow:0 0 0 1px #cbd5e1; cursor:pointer;
    }

    /* ---------- Canvas ---------- */
    #tbm_root .tbm-canvas-wrap{
      display:none; overflow:auto; max-width:100%; border-radius:10px;
      background-image:linear-gradient(45deg,#e5e7eb 25%,transparent 25%),linear-gradient(-45deg,#e5e7eb 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#e5e7eb 75%),linear-gradient(-45deg,transparent 75%,#e5e7eb 75%);
      background-size:20px 20px; background-position:0 0,0 10px,10px -10px,-10px 0px;
      border:1px solid #e2e8f0; margin-bottom:14px; padding:8px;
    }
    #tbm_root canvas{ display:block; margin:0 auto; max-width:none; cursor:default; }
    #tbm_root canvas.tbm-picking{ cursor:crosshair; }

    /* ---------- Buttons (never white — must stand out from white page bg) ---------- */
    #tbm_root .tbm-btn{
      border:none; border-radius:8px; font-weight:700 !important; cursor:pointer;
      padding:10px 18px; font-size:13px !important; color:#ffffff !important;
      font-family:'Inter','Segoe UI',Arial,sans-serif !important;
      transition:filter .15s ease; display:inline-flex; align-items:center; gap:6px; justify-content:center;
    }
    #tbm_root .tbm-btn:hover{ filter:brightness(0.92); }
    #tbm_root .tbm-btn:active{ filter:brightness(0.85); }
    #tbm_root .tbm-btn-primary{ background:var(--tbm-primary); }
    #tbm_root .tbm-btn-green{ background:var(--tbm-green); }
    #tbm_root .tbm-btn-red{ background:var(--tbm-red); }
    #tbm_root .tbm-btn-purple{ background:var(--tbm-purple); }
    #tbm_root .tbm-btn-amber{ background:var(--tbm-amber); }
    #tbm_root .tbm-btn-outline{
      background:#fff; color:var(--tbm-primary-dark) !important; border:2px solid var(--tbm-primary);
    }
    #tbm_root .tbm-btn.tbm-active{ outline:3px solid #1e3a8a55; }
    #tbm_root .tbm-btn:disabled{ opacity:.5; cursor:not-allowed; filter:none; }

    #tbm_root .tbm-actions{ display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-bottom:10px; }
    #tbm_root .tbm-download-row{ display:none; flex-wrap:wrap; gap:10px; justify-content:center; align-items:center; }
    #tbm_root select#tbm_format{
      padding:9px 10px; border-radius:8px; border:1px solid #cbd5e1; font-size:13px; color:var(--tbm-text) !important;
      background:#fff; cursor:pointer;
    }

    /* ---------- Loading overlay ---------- */
    #tbm_root .tbm-overlay{
      display:none; position:absolute; inset:0; background:rgba(255,255,255,.85);
      align-items:center; justify-content:center; border-radius:16px; z-index:20; flex-direction:column; gap:10px;
    }
    #tbm_root .tbm-spinner{
      width:34px; height:34px; border:4px solid #dbeafe; border-top-color:var(--tbm-primary);
      border-radius:50%; animation:tbm-spin .8s linear infinite;
    }
    @keyframes tbm-spin{ to{ transform:rotate(360deg); } }
    #tbm_root .tbm-overlay span{ font-size:12px; color:var(--tbm-muted) !important; font-weight:700; }

    /* ---------- Mobile ---------- */
    @media (max-width:560px){
      #tbm_root{ padding:16px; margin:10px; }
      #tbm_root .tbm-row{ flex-direction:column; gap:12px; }
      #tbm_root .tbm-field{ min-width:100%; }
      #tbm_root .tbm-btn{ flex:1 1 auto; }
      #tbm_root .tbm-actions, #tbm_root .tbm-download-row{ flex-direction:column; align-items:stretch; }
    }
  </style>

  <h3 class="tbm-title">Transparent Background Maker</h3>
  <p class="tbm-sub">Upload a photo, pick the background colour(s), and export a clean transparent image.</p>

  <!-- Upload -->
  <div class="tbm-upload" id="tbm_uploadArea">
    <p id="tbm_status">📤 Click, drag &amp; drop, or paste an image here</p>
    <small>Supports PNG · JPG · WEBP · GIF · BMP · SVG</small>
    <input type="file" id="tbm_fileInput" accept="image/png,image/jpeg,image/jpg,image/webp,image/gif,image/bmp,image/svg+xml" style="display:none">
  </div>

  <div class="tbm-info" id="tbm_info"></div>

  <!-- Controls -->
  <div class="tbm-controls" id="tbm_controlPanel">

    <div class="tbm-field" style="flex:1 1 100%;">
      <label>Background colour(s) to remove</label>
      <div class="tbm-colors" id="tbm_colorChips"></div>
      <div class="tbm-row" style="margin-top:4px;">
        <input type="color" id="tbm_newColor" value="#ffffff" title="Pick a custom colour">
        <button class="tbm-btn tbm-btn-primary" id="tbm_addColorBtn" type="button">+ Add colour</button>
        <button class="tbm-btn tbm-btn-purple" id="tbm_pickBtn" type="button">🎯 Pick from image</button>
        <div class="tbm-presets" id="tbm_presets" style="align-self:center;"></div>
      </div>
    </div>

    <div class="tbm-row">
      <div class="tbm-field">
        <label>Sensitivity (tolerance) <span class="tbm-val" id="tbm_tolVal">30</span></label>
        <input type="range" id="tbm_tolerance" min="1" max="200" value="30">
      </div>
      <div class="tbm-field">
        <label>Edge softness (feather) <span class="tbm-val" id="tbm_featherVal">15</span></label>
        <input type="range" id="tbm_feather" min="0" max="120" value="15">
      </div>
      <div class="tbm-field">
        <label>Zoom <span class="tbm-val" id="tbm_zoomVal">100%</span></label>
        <input type="range" id="tbm_zoom" min="25" max="300" value="100">
      </div>
    </div>

    <div class="tbm-row">
      <label class="tbm-checkbox"><input type="checkbox" id="tbm_invert"> Invert (keep only the picked colours)</label>
      <label class="tbm-checkbox"><input type="checkbox" id="tbm_trim"> Trim empty transparent edges on download</label>
    </div>
  </div>

  <!-- Canvas preview -->
  <div class="tbm-canvas-wrap" id="tbm_canvasWrap">
    <canvas id="tbm_canvas"></canvas>
  </div>

  <div class="tbm-actions" id="tbm_actions" style="display:none;">
    <button class="tbm-btn tbm-btn-outline" id="tbm_compareBtn" type="button">👁 Hold to compare original</button>
    <button class="tbm-btn tbm-btn-amber" id="tbm_resetBtn" type="button">↺ Reset settings</button>
    <button class="tbm-btn tbm-btn-red" id="tbm_newImgBtn" type="button">🗑 New image</button>
  </div>

  <div class="tbm-download-row" id="tbm_downloadRow">
    <select id="tbm_format">
      <option value="png">PNG (transparent)</option>
      <option value="webp">WEBP (transparent)</option>
      <option value="jpeg">JPEG (needs solid background)</option>
    </select>
    <input type="color" id="tbm_bgFill" value="#ffffff" style="display:none;" title="Background colour for JPEG">
    <button class="tbm-btn tbm-btn-green" id="tbm_downloadBtn" type="button">⬇ Download image</button>
  </div>

  <div class="tbm-overlay" id="tbm_overlay">
    <div class="tbm-spinner"></div>
    <span id="tbm_overlayText">Processing…</span>
  </div>
</div>

<script>
(function(){
  "use strict";

  var root = document.getElementById('tbm_root');
  if (!root) return;

  var $ = function(id){ return document.getElementById(id); };

  var uploadArea   = $('tbm_uploadArea');
  var fileInput    = $('tbm_fileInput');
  var status       = $('tbm_status');
  var info         = $('tbm_info');
  var controlPanel = $('tbm_controlPanel');
  var canvasWrap   = $('tbm_canvasWrap');
  var canvas       = $('tbm_canvas');
  var ctx          = canvas.getContext('2d', { willReadFrequently:true });
  var actions      = $('tbm_actions');
  var downloadRow  = $('tbm_downloadRow');
  var overlay      = $('tbm_overlay');
  var overlayText  = $('tbm_overlayText');

  var colorChipsEl = $('tbm_colorChips');
  var newColorInp  = $('tbm_newColor');
  var addColorBtn  = $('tbm_addColorBtn');
  var pickBtn      = $('tbm_pickBtn');
  var presetsEl    = $('tbm_presets');

  var toleranceInp = $('tbm_tolerance');
  var tolVal       = $('tbm_tolVal');
  var featherInp   = $('tbm_feather');
  var featherVal   = $('tbm_featherVal');
  var zoomInp      = $('tbm_zoom');
  var zoomVal      = $('tbm_zoomVal');
  var invertInp    = $('tbm_invert');
  var trimInp      = $('tbm_trim');

  var compareBtn   = $('tbm_compareBtn');
  var resetBtn     = $('tbm_resetBtn');
  var newImgBtn    = $('tbm_newImgBtn');

  var formatSel    = $('tbm_format');
  var bgFillInp    = $('tbm_bgFill');
  var downloadBtn  = $('tbm_downloadBtn');

  var originalImage = null;   // the uploaded <img>
  var origCanvas = document.createElement('canvas'); // full-res untouched copy, for eyedropper sampling
  var origCtx = origCanvas.getContext('2d', { willReadFrequently:true });
  var targetColors = ['#ffffff'];  // hex list
  var pickingColor = false;
  var isComparing = false;

  var PRESETS = ['#ffffff','#000000','#00ff00','#0000ff','#ff0000','#808080'];

  // ---------- Setup preset dots ----------
  PRESETS.forEach(function(hex){
    var dot = document.createElement('div');
    dot.className = 'tbm-preset-dot';
    dot.style.background = hex;
    dot.title = hex;
    dot.addEventListener('click', function(){
      addColor(hex);
    });
    presetsEl.appendChild(dot);
  });

  // ---------- Upload interactions ----------
  uploadArea.addEventListener('click', function(){ fileInput.click(); });

  fileInput.addEventListener('change', function(e){
    if (e.target.files && e.target.files[0]) loadFile(e.target.files[0]);
  });

  ['dragenter','dragover'].forEach(function(evt){
    uploadArea.addEventListener(evt, function(e){
      e.preventDefault(); e.stopPropagation();
      uploadArea.classList.add('tbm-drag');
    });
  });
  ['dragleave','drop'].forEach(function(evt){
    uploadArea.addEventListener(evt, function(e){
      e.preventDefault(); e.stopPropagation();
      uploadArea.classList.remove('tbm-drag');
    });
  });
  uploadArea.addEventListener('drop', function(e){
    var f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
    if (f) loadFile(f);
  });

  // Paste support (only while this widget has focus, so it never hijacks the rest of the page)
  root.addEventListener('paste', function(e){
    var items = (e.clipboardData || window.clipboardData).items;
    if (!items) return;
    for (var i=0; i<items.length; i++){
      if (items[i].type.indexOf('image') !== -1){
        var blob = items[i].getAsFile();
        if (blob) loadFile(blob);
        break;
      }
    }
  });

  function loadFile(file){
    if (!file.type || file.type.indexOf('image') === -1){
      status.textContent = '⚠️ Please choose a valid image file';
      return;
    }
    var reader = new FileReader();
    reader.onload = function(ev){
      var img = new Image();
      img.onload = function(){
        originalImage = img;
        canvas.width = img.width;
        canvas.height = img.height;
        origCanvas.width = img.width;
        origCanvas.height = img.height;
        origCtx.clearRect(0,0,img.width,img.height);
        origCtx.drawImage(img,0,0);

        canvasWrap.style.display = 'block';
        controlPanel.style.display = 'flex';
        actions.style.display = 'flex';
        downloadRow.style.display = 'flex';

        var kb = Math.round(file.size/1024);
        info.style.display = 'block';
        info.textContent = '🖼 ' + (file.name || 'image') + '  •  ' + img.width + '×' + img.height + 'px  •  ' + kb + ' KB';
        status.textContent = '✅ Image loaded — click to upload a different one';

        applyZoom();
        processImage();
      };
      img.onerror = function(){
        status.textContent = '⚠️ Could not read that file. Try another image.';
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  // ---------- Colour chip management ----------
  function renderChips(){
    colorChipsEl.innerHTML = '';
    if (targetColors.length === 0){
      var empty = document.createElement('span');
      empty.style.fontSize = '11px';
      empty.style.color = '#94a3b8';
      empty.textContent = 'No colours selected yet — add at least one.';
      colorChipsEl.appendChild(empty);
      return;
    }
    targetColors.forEach(function(hex, idx){
      var chip = document.createElement('div');
      chip.className = 'tbm-chip';

      var sw = document.createElement('div');
      sw.className = 'tbm-swatch';
      sw.style.background = hex;
      chip.appendChild(sw);

      var label = document.createElement('span');
      label.textContent = hex.toUpperCase();
      chip.appendChild(label);

      if (targetColors.length > 1){
        var rm = document.createElement('button');
        rm.type = 'button';
        rm.textContent = '×';
        rm.title = 'Remove this colour';
        rm.addEventListener('click', function(){
          targetColors.splice(idx,1);
          renderChips();
          processImage();
        });
        chip.appendChild(rm);
      }
      colorChipsEl.appendChild(chip);
    });
  }

  function addColor(hex){
    hex = hex.toLowerCase();
    if (targetColors.indexOf(hex) === -1){
      targetColors.push(hex);
      renderChips();
      processImage();
    }
  }

  addColorBtn.addEventListener('click', function(){ addColor(newColorInp.value); });

  // ---------- Eyedropper ----------
  pickBtn.addEventListener('click', function(){
    if (!originalImage){ return; }
    pickingColor = !pickingColor;
    canvas.classList.toggle('tbm-picking', pickingColor);
    pickBtn.classList.toggle('tbm-active', pickingColor);
    pickBtn.textContent = pickingColor ? '🎯 Click on the image…' : '🎯 Pick from image';
  });

  canvas.addEventListener('click', function(e){
    if (!pickingColor || !originalImage) return;
    var rect = canvas.getBoundingClientRect();
    var scaleX = canvas.width / rect.width;
    var scaleY = canvas.height / rect.height;
    var x = Math.floor((e.clientX - rect.left) * scaleX);
    var y = Math.floor((e.clientY - rect.top) * scaleY);
    x = Math.max(0, Math.min(canvas.width-1, x));
    y = Math.max(0, Math.min(canvas.height-1, y));

    var pixel = origCtx.getImageData(x, y, 1, 1).data;
    var hex = '#' + [pixel[0],pixel[1],pixel[2]].map(function(v){
      return v.toString(16).padStart(2,'0');
    }).join('');

    addColor(hex);

    pickingColor = false;
    canvas.classList.remove('tbm-picking');
    pickBtn.classList.remove('tbm-active');
    pickBtn.textContent = '🎯 Pick from image';
  });

  // ---------- Sliders ----------
  toleranceInp.addEventListener('input', function(){
    tolVal.textContent = toleranceInp.value;
    processImage();
  });
  featherInp.addEventListener('input', function(){
    featherVal.textContent = featherInp.value;
    processImage();
  });
  zoomInp.addEventListener('input', function(){
    zoomVal.textContent = zoomInp.value + '%';
    applyZoom();
  });
  invertInp.addEventListener('change', processImage);

  function applyZoom(){
    if (!originalImage) return;
    var scale = parseInt(zoomInp.value,10) / 100;
    canvas.style.width = (canvas.width * scale) + 'px';
    canvas.style.height = (canvas.height * scale) + 'px';
  }

  // ---------- Core processing (always re-computed from the original — non-destructive) ----------
  function processImage(){
    if (!originalImage) return;

    overlay.style.display = 'flex';
    overlayText.textContent = 'Processing…';

    // small timeout lets the spinner paint before the (potentially heavy) pixel loop runs
    setTimeout(function(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(originalImage, 0, 0);

      var tolerance = parseInt(toleranceInp.value,10);
      var feather   = Math.min(parseInt(featherInp.value,10), tolerance); // feather can't exceed tolerance
      var invert    = invertInp.checked;

      var colorsRGB = targetColors.map(function(hex){
        return {
          r: parseInt(hex.slice(1,3),16),
          g: parseInt(hex.slice(3,5),16),
          b: parseInt(hex.slice(5,7),16)
        };
      });

      var imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
      var data = imgData.data;
      var lower = Math.max(0, tolerance - feather);
      var upper = tolerance;
      var range = Math.max(1, upper - lower);

      for (var i=0; i<data.length; i+=4){
        if (colorsRGB.length === 0) continue;
        var r = data[i], g = data[i+1], b = data[i+2];
        var minDist = Infinity;
        for (var c=0; c<colorsRGB.length; c++){
          var dr = r - colorsRGB[c].r, dg = g - colorsRGB[c].g, db = b - colorsRGB[c].b;
          var d = Math.sqrt(dr*dr + dg*dg + db*db);
          if (d < minDist) minDist = d;
        }

        var alpha;
        if (minDist <= lower) alpha = 0;
        else if (minDist >= upper) alpha = 255;
        else alpha = 255 * (minDist - lower) / range;

        if (invert) alpha = 255 - alpha;

        data[i+3] = Math.round(data[i+3] * (alpha/255));
      }

      ctx.putImageData(imgData, 0, 0);
      overlay.style.display = 'none';
    }, 10);
  }

  // ---------- Compare (hold to see original) ----------
  function showOriginal(){
    if (!originalImage || isComparing) return;
    isComparing = true;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(originalImage,0,0);
  }
  function showProcessed(){
    if (!isComparing) return;
    isComparing = false;
    processImage();
  }
  compareBtn.addEventListener('pointerdown', showOriginal);
  compareBtn.addEventListener('pointerup', showProcessed);
  compareBtn.addEventListener('pointerleave', showProcessed);
  compareBtn.addEventListener('pointercancel', showProcessed);

  // ---------- Reset / New image ----------
  resetBtn.addEventListener('click', function(){
    targetColors = ['#ffffff'];
    toleranceInp.value = 30; tolVal.textContent = '30';
    featherInp.value = 15; featherVal.textContent = '15';
    zoomInp.value = 100; zoomVal.textContent = '100%';
    invertInp.checked = false;
    trimInp.checked = false;
    renderChips();
    applyZoom();
    processImage();
  });

  newImgBtn.addEventListener('click', function(){
    originalImage = null;
    canvas.width = 0; canvas.height = 0;
    canvasWrap.style.display = 'none';
    controlPanel.style.display = 'none';
    actions.style.display = 'none';
    downloadRow.style.display = 'none';
    info.style.display = 'none';
    fileInput.value = '';
    status.textContent = '📤 Click, drag & drop, or paste an image here';
  });

  // ---------- Download ----------
  formatSel.addEventListener('change', function(){
    bgFillInp.style.display = (formatSel.value === 'jpeg') ? 'inline-block' : 'none';
  });

  function getTrimmedCanvas(sourceCanvas){
    var sctx = sourceCanvas.getContext('2d');
    var data = sctx.getImageData(0,0,sourceCanvas.width,sourceCanvas.height).data;
    var w = sourceCanvas.width, h = sourceCanvas.height;
    var minX=w, minY=h, maxX=0, maxY=0, found=false;

    for (var y=0; y<h; y++){
      for (var x=0; x<w; x++){
        var alpha = data[(y*w+x)*4+3];
        if (alpha > 0){
          found = true;
          if (x<minX) minX=x;
          if (x>maxX) maxX=x;
          if (y<minY) minY=y;
          if (y>maxY) maxY=y;
        }
      }
    }
    if (!found) return sourceCanvas;

    var trimmed = document.createElement('canvas');
    trimmed.width = (maxX-minX+1);
    trimmed.height = (maxY-minY+1);
    trimmed.getContext('2d').drawImage(sourceCanvas, -minX, -minY);
    return trimmed;
  }

  downloadBtn.addEventListener('click', function(){
    if (!originalImage) return;

    overlay.style.display = 'flex';
    overlayText.textContent = 'Preparing download…';

    setTimeout(function(){
      var exportCanvas = trimInp.checked ? getTrimmedCanvas(canvas) : canvas;
      var format = formatSel.value;
      var mime = format === 'jpeg' ? 'image/jpeg' : (format === 'webp' ? 'image/webp' : 'image/png');
      var ext = format === 'jpeg' ? 'jpg' : format;

      var finalCanvas = exportCanvas;
      if (format === 'jpeg'){
        finalCanvas = document.createElement('canvas');
        finalCanvas.width = exportCanvas.width;
        finalCanvas.height = exportCanvas.height;
        var fctx = finalCanvas.getContext('2d');
        fctx.fillStyle = bgFillInp.value;
        fctx.fillRect(0,0,finalCanvas.width,finalCanvas.height);
        fctx.drawImage(exportCanvas,0,0);
      }

      var link = document.createElement('a');
      link.download = 'transparent-image.' + ext;
      link.href = finalCanvas.toDataURL(mime, 0.95);
      link.click();

      overlay.style.display = 'none';
    }, 10);
  });

  // initial chip render
  renderChips();

})();
</script>
